<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - CineBookOnline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
            background: linear-gradient(135deg, #1f1c2c 0%, #928DAB 100%); 
            color: #ffffff;
            padding: 20px 0;
        }
        .card { 
            background: rgba(20, 20, 20, 0.85); 
            padding: 30px 40px; border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            width: 650px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { text-align: center; color: #e50914; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase;}
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; position: relative; }
        .form-group.full-width { grid-column: span 2; }
        
        label { margin-bottom: 8px; font-size: 13px; font-weight: bold; color: #ccc; }
        
        /* Icon trong input */
        .input-wrapper { position: relative; }
        .input-wrapper i { 
            position: absolute; left: 15px; top: 50%; 
            transform: translateY(-50%); color: #888; 
        }

        input, select { 
            width: 100%; padding: 12px 12px 12px 40px; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none;
            transition: 0.3s;
        }
        select { padding-left: 40px; appearance: none; } /* Reset select style */
        select option { background: #1f1c2c; color: white; }

        input:focus, select:focus { 
            border-color: #e50914; background: rgba(255, 255, 255, 0.1); 
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }
        
        .btn-submit { 
            grid-column: span 2; padding: 14px; background-color: #e50914; 
            color: white; border: none; border-radius: 8px; cursor: pointer; 
            font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 15px;
        }
        .btn-submit:hover { background-color: #f40612; box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); }
        
        .error { 
            background-color: rgba(217, 83, 79, 0.2); color: #ff6b6b; 
            border: 1px solid #d9534f; padding: 12px; border-radius: 8px; 
            margin-bottom: 20px; text-align: center; font-weight: bold;
        }
        
        .link { text-align: center; margin-top: 25px; font-size: 14px; color: #ccc; }
        .link a { color: #e50914; text-decoration: none; font-weight: bold; }
        .link a:hover { color: white; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎬 Đăng Ký Thành Viên</h2>
        
        <div class="error" th:if="${error}">
            <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
        </div>
        
        <form th:action="@{/register}" method="POST" class="grid-container">
            <div class="form-group">
                <label>Tên đăng nhập (*)</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Nhập username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Mật khẩu (*)</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
            </div>
            
            <div class="form-group full-width">
                <label>Họ và Tên</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" name="fullname" placeholder="Họ và tên đầy đủ">
                </div>
            </div>
            
            <div class="form-group">
                <label>Email (*)</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="email@example.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Số điện thoại</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone"></i>
                    <input type="text" name="phone" placeholder="Số điện thoại của bạn">
                </div>
            </div>
            
            <div class="form-group">
                <label>Ngày sinh</label>
                <div class="input-wrapper">
                    <i class="fas fa-calendar-alt"></i>
                    <input type="date" name="birthday">
                </div>
            </div>
            
            <div class="form-group">
                <label>Giới tính</label>
                <div class="input-wrapper">
                    <i class="fas fa-venus-mars"></i>
                    <select name="gender">
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group full-width">
                <label>Địa chỉ</label>
                <div class="input-wrapper">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" name="address" placeholder="Địa chỉ thường trú">
                </div>
            </div>
            
            <button type="submit" class="btn-submit">
                <i class="fas fa-user-plus"></i> Đăng Ký Tài Khoản
            </button>
        </form>
        
        <div class="link">
            Đã là thành viên? <a href="/login">Đăng nhập ngay</a>
        </div>
    </div>
</body>
</html>
